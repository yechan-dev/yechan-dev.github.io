<!DOCTYPE html>
<html>
<head>
  <meta charset=""UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yechan Web</title>
  <style>
  html{
    transition: ease 0.3s;
    border-color: black;
    color: black;
  }
  .align{
    text-align: center;
  }
  h3{
    margin-bottom: 0px;
  }
  #mode{
    width: 30px;
    height: 30px;
    border: 1px solid currentColor;
    color: inherit;
    border-radius: 6px;
    font-size: 12px;
    background-color: transparent;
    outline: none;
  }
  a{
    color: inherit;
  }
  </style>
</head>
<body>
  <button id="mode" onclick="theme()">☀</button>
  <div class="align">
    <h1>Yechan Web</h1>
    <hr>
  </div><br>
  <h4><a href="https://yechan-dev.github.io/mix/">1. 랜덤 엮기</a></h4>
  <script>
  let html = document.querySelector("html");
  let mode = document.getElementById("mode");
  let themes = 0;
  function theme(){
    if(themes == 0){
      themes = 1;
      html.style.color = "black";
      html.style.backgroundColor = "white";
      mode.textContent = "☀";
    }else{
      themes = 0;
      html.style.color = "white";
      html.style.backgroundColor = "rgb(21,21,21)";
      mode.textContent = "☾";
    }
  }
  </script>
</body>
</html>
